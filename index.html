<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XDownloader | Premium Hub by KIMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { cairo: ['Cairo', 'sans-serif'], orbitron: ['Orbitron', 'sans-serif'] } } } }
    </script>
    <style>
        body { background-color: #020206; background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(219, 39, 119, 0.1) 0px, transparent 50%); }
        .kimo-neon-badge { text-shadow: 0 0 12px rgba(168, 85, 247, 0.9), 0 0 25px rgba(236, 72, 153, 0.7); box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); animation: borderPulse 3s infinite alternate; }
        @keyframes borderPulse { 0% { border-color: rgba(139, 92, 246, 0.4); transform: scale(1); } 100% { border-color: rgba(236, 72, 153, 0.8); transform: scale(1.02); } }
        .yt-card:hover { border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); } .yt-card:hover i { color: #ff0000; transform: scale(1.2) rotate(8deg); }
        .ig-card:hover { border-color: #e1306c; box-shadow: 0 0 20px rgba(225, 48, 108, 0.4); } .ig-card:hover i { color: #e1306c; transform: scale(1.2) rotate(-8deg); }
        .tt-card:hover { border-color: #00f2ea; box-shadow: 0 0 20px rgba(0, 242, 234, 0.4); } .tt-card:hover i { color: #00f2ea; transform: scale(1.2) rotate(8deg); }
        .fb-card:hover { border-color: #1877f2; box-shadow: 0 0 20px rgba(24, 119, 242, 0.4); } .fb-card:hover i { color: #1877f2; transform: scale(1.2) rotate(-8deg); }
    </style>
</head>
<body class="text-slate-200 font-cairo min-h-screen flex flex-col justify-between overflow-x-hidden relative">

    <header class="border-b border-purple-900/20 bg-black/60 backdrop-blur-2xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-purple-600 to-pink-600 p-2.5 rounded-xl text-white shadow-xl animate-pulse">
                    <i class="fa-solid fa-bolt text-xl animate-spin" style="animation-duration: 4s;"></i>
                </div>
                <span class="text-2xl font-black font-orbitron tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-cyan-400">XDOWNLOADER</span>
            </div>
            <span class="kimo-neon-badge bg-black/40 text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-cyan-200 text-xs sm:text-sm px-5 py-2.5 rounded-xl border font-black font-orbitron tracking-wider">BY KIMO PRO</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-16 px-4">
        <div class="max-w-3xl w-full space-y-12 text-center">
            
            <div class="space-y-4">
                <h1 class="text-4xl sm:text-7xl font-black text-white leading-tight">
                    استخراج وبث <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500">الوسائط السحابية</span>
                </h1>
                <p class="text-slate-400 text-xs sm:text-base max-w-xl mx-auto font-medium">
                    محرّكك الخاص المستقل 100%. بدون إعلانات وبدون توقف.
                </p>
            </div>

            <div class="bg-slate-950/40 backdrop-blur-3xl p-6 sm:p-10 rounded-3xl border border-purple-500/10 shadow-2xl relative text-right">
                <form id="coreDownloaderForm" class="space-y-6">
                    <div class="relative flex items-center">
                        <div class="absolute right-4 text-purple-500 text-xl animate-pulse">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                        </div>
                        <input type="url" id="targetUrlInput" required placeholder="ضع رابط المقطع هنا..." class="w-full bg-black/60 border border-slate-800 focus:border-purple-500 rounded-2xl py-5 pr-14 pl-28 text-white text-left text-sm transition-all shadow-inner">
                        <button type="button" id="pasteBtn" class="absolute left-3 bg-slate-900 text-slate-300 text-xs px-4 py-3 rounded-xl font-bold cursor-pointer hover:bg-purple-950 transition-all"><i class="fa-solid fa-paste"></i> لصق</button>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-pink-600 text-white font-black py-5 px-6 rounded-2xl transition-all text-base cursor-pointer flex items-center justify-center gap-2 shadow-[0_0_30px_rgba(147,51,234,0.3)] active:scale-[0.98]">
                        <span>بدء الاستخراج من سيرفر كيمو الخاص</span>
                        <i class="fa-solid fa-server text-xl animate-pulse"></i>
                    </button>
                </form>

                <div id="dynamicResultWrapper" class="mt-10 pt-8 border-t border-purple-950/40 hidden">
                    <div id="engineLoading" class="hidden flex-col items-center justify-center py-8 space-y-3">
                        <div class="w-12 h-12 border-4 border-purple-500/10 border-t-pink-500 rounded-full animate-spin"></div>
                        <p class="text-purple-400 text-xs font-bold animate-pulse">جاري سحب الجودات من خلال الباك-إند المخصص...</p>
                    </div>

                    <div id="engineError" class="hidden bg-red-950/20 border border-red-500/30 text-red-400 p-4 rounded-xl text-xs text-center font-bold"></div>

                    <div id="engineSuccess" class="hidden space-y-6">
                        <div class="bg-black/50 p-5 rounded-2xl border border-slate-900 flex flex-col sm:flex-row gap-5 items-center">
                            <div class="w-full sm:w-44 h-28 bg-slate-900 rounded-xl overflow-hidden border border-slate-800 shrink-0">
                                <img id="resThumbnail" src="" class="w-full h-full object-cover" alt="Thumbnail">
                            </div>
                            <div class="w-full text-right space-y-2">
                                <span id="resPlatformBadge" class="bg-purple-500/10 text-purple-400 border border-purple-500/20 text-[10px] px-2.5 py-1 rounded font-black font-orbitron">KIMO SERVER</span>
                                <h3 id="resTitle" class="text-sm sm:text-base font-bold text-slate-100 line-clamp-2"></h3>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h4 class="text-xs font-black text-slate-400 text-right uppercase tracking-wider"><i class="fa-solid fa-sliders text-pink-500"></i> روابط التحميل المباشرة:</h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="actionLinksContainer"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- بيئة الأيقونات -->
            <div class="space-y-5 pt-4">
                <p class="text-[11px] font-black uppercase tracking-widest text-slate-500 font-orbitron">Supported Platforms</p>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 max-w-2xl mx-auto">
                    <div class="platform-card yt-card bg-black/40 p-5 rounded-2xl border border-slate-900 flex items-center justify-center gap-3 transition-all cursor-pointer"><i class="fa-brands fa-youtube text-2xl text-slate-600"></i><span class="text-xs font-bold font-orbitron text-slate-400">YouTube</span></div>
                    <div class="platform-card ig-card bg-black/40 p-5 rounded-2xl border border-slate-900 flex items-center justify-center gap-3 transition-all cursor-pointer"><i class="fa-brands fa-instagram text-2xl text-slate-600"></i><span class="text-xs font-bold font-orbitron text-slate-400">Instagram</span></div>
                    <div class="platform-card tt-card bg-black/40 p-5 rounded-2xl border border-slate-900 flex items-center justify-center gap-3 transition-all cursor-pointer"><i class="fa-brands fa-tiktok text-2xl text-slate-600"></i><span class="text-xs font-bold font-orbitron text-slate-400">TikTok</span></div>
                    <div class="platform-card fb-card bg-black/40 p-5 rounded-2xl border border-slate-900 flex items-center justify-center gap-3 transition-all cursor-pointer"><i class="fa-brands fa-facebook text-2xl text-slate-600"></i><span class="text-xs font-bold font-orbitron text-slate-400">Facebook</span></div>
                </div>
            </div>

        </div>
    </main>

    <footer class="border-t border-purple-950/20 bg-black/60 backdrop-blur-2xl py-6 text-center text-[11px] text-slate-500 font-orbitron tracking-widest">
        ARCHITECTED & DEPLOYED BY <span class="text-purple-400 font-bold">KIMO PRO</span> © 2026
    </footer>

    <script>
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try { document.getElementById('targetUrlInput').value = await navigator.clipboard.readText(); } catch (e) {}
        });

        document.getElementById('coreDownloaderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const rawUrl = document.getElementById('targetUrlInput').value.trim();
            const wrapper = document.getElementById('dynamicResultWrapper');
            const loader = document.getElementById('engineLoading');
            const errorBlock = document.getElementById('engineError');
            const successBlock = document.getElementById('engineSuccess');
            const linksContainer = document.getElementById('actionLinksContainer');
            const submitBtn = document.getElementById('submitBtn');
            
            wrapper.classList.remove('hidden');
            loader.classList.remove('hidden');
            errorBlock.classList.add('hidden');
            successBlock.classList.add('hidden');
            submitBtn.disabled = true;

            try {
                // استدعاء السيرفر بتاعك المحلي (تغير الرابط لـ رابط دبلومينت السيرفر لما ترفعه)
                const response = await fetch('http://127.0.0.1:5000/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: rawUrl })
                });

                const data = await response.json();
                if (data.status === 'error' || !data.video_url) throw new Error(data.message || 'فشلت معالجة الرابط');

                document.getElementById('resTitle').innerText = data.title;
                document.getElementById('resThumbnail').src = data.thumbnail;

                linksContainer.innerHTML = `
                    <a href="${data.video_url}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-between bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90 p-4.5 rounded-xl text-white font-bold text-sm shadow-md transition-all cursor-pointer">
                        <span><i class="fa-solid fa-video mr-1 animate-pulse"></i> تحميل المقطع مباشر بأعلى جودة</span>
                        <i class="fa-solid fa-arrow-down"></i>
                    </a>
                `;

                if (data.picker) {
                    data.picker.forEach((item, index) => {
                        linksContainer.innerHTML += `
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-between bg-slate-900 border border-slate-800 p-4 rounded-xl text-xs font-bold text-white transition-all hover:border-purple-500">
                                <span>تحميل الجزء ${index + 1}</span>
                            </a>
                        `;
                    });
                }

                loader.classList.add('hidden');
                successBlock.classList.remove('hidden');

            } catch (err) {
                errorBlock.innerText = err.message || "فشلت العملية، تأكد من أن الرابط عام وليس خاص.";
                loader.classList.add('hidden');
                errorBlock.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
