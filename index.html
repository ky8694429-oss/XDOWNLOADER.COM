<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BRAND STORE | كـيمـو</title>
    <style>
        :root { --red: #ff0000; --gold: #ffd700; --3d-shadow: 5px 5px 15px rgba(0,0,0,0.8); }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* ستايل أمازون برو */
        nav { background: #111; padding: 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--red); }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 40px; }

        /* كارت 3D */
        .card {
            background: #0a0a0a; border: 1px solid #222; padding: 15px;
            transform: perspective(1000px) rotateX(5deg);
            transition: 0.5s; box-shadow: var(--3d-shadow);
        }
        .card:hover { transform: perspective(1000px) rotateX(0deg) scale(1.05); border-color: var(--red); }

        .price { color: var(--gold); font-size: 1.5rem; font-weight: bold; }
        
        /* زرار واتساب */
        .btn-buy {
            background: #25d366; color: white; padding: 10px; border: none;
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; margin-top: 10px;
        }

        .seller-badge { background: var(--red); padding: 2px 8px; font-size: 10px; border-radius: 3px; }
    </style>
</head>
<body>

<nav>
    <h2>BRAND STORE</h2>
    <div>
        <button class="seller-badge">لوحة البائع</button>
        <span>🛒 السلة</span>
    </div>
</nav>

<div class="product-grid">
    <div class="card">
        <img src="https://via.placeholder.com/200" style="width:100%; border-radius:10px;">
        <h3>هودي أوفر سايز - براند كيمو</h3>
        <p>المقاس: XL, L, M</p>
        <div class="price">500 EGP</div>
        <a href="https://wa.me/201000000000?text=أنا مهتم بالهودي" class="btn-buy">
            تواصل عبر واتساب
        </a>
    </div>
</div>

</body>
</html>
