<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ZENON AETHER-OS | FIXED ELITE</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --red: #ff0000; --dark: #8B0000; --black: #000; }
        body, html { margin: 0; background: var(--black); color: var(--red); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }

        /* اللوجو الخلفي الثابت (تصميم مرعب) */
        #bg-logo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 350px; z-index: 1; opacity: 0.15; filter: drop-shadow(0 0 10px var(--red)); }

        /* الكاميرا والهيكل */
        #input_video { display: none; }
        #output_canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99; }

        #ui-layer { position: relative; z-index: 100; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .header { font-size: 3rem; text-shadow: 0 0 15px var(--red); letter-spacing: 12px; margin-bottom: 20px; }

        /* بار البحث */
        #search-input { width: 70%; height: 60px; background: rgba(10,0,0,0.9); border: 2px solid var(--red); color: #fff; font-size: 1.5rem; text-align: center; border-radius: 10px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }

        /* الكيبورد */
        #kbd { display: none; grid-template-columns: repeat(10, 1fr); gap: 10px; width: 80%; margin-top: 20px; background: rgba(5,0,0,0.95); padding: 20px; border: 1px solid var(--red); }
        .key { padding: 15px; border: 1px solid var(--dark); background: #000; color: #fff; text-align: center; cursor: none; transition: 0.2s; }
        .key.active { background: var(--red); color: #000; box-shadow: 0 0 30px var(--red); transform: scale(1.1); }

        /* الأزرار السفلى */
        .dock { display: flex; gap: 30px; margin-top: 40px; }
        .btn { width: 120px; height: 120px; border: 2px solid var(--red); display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050000; transition: 0.4s; }
        .btn.active { background: var(--red); color: #000; box-shadow: 0 0 50px var(--red); }

        /* النيشان */
        #crosshair { position: fixed; width: 40px; height: 40px; border: 2px solid #fff; border-radius: 50%; pointer-events: none; z-index: 1001; display: none; box-shadow: 0 0 15px var(--red); }
    </style>
</head>
<body>

    <div id="bg-logo">
        <svg viewBox="0 0 100 100">
            <path d="M20 20 L40 50 L20 80 M80 20 L60 50 L80 80 M40 50 L60 50 M30 70 Q50 90 70 70" stroke="red" stroke-width="3" fill="none" />
        </svg>
    </div>

    <div id="crosshair"></div>
    <video id="input_video" autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div class="header">ZENON_AETHER</div>
        <input type="text" id="search-input" placeholder="WAVE TO START" readonly>

        <div id="kbd"></div>

        <div class="dock">
            <div class="btn" id="b-search"><b>SEARCH</b></div>
            <div class="btn" id="b-voice"><b>VOICE</b></div>
            <div class="btn" id="b-clear"><b>CLEAR</b></div>
        </div>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

    <script>
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const crosshair = document.getElementById('crosshair');
        const searchInput = document.getElementById('search-input');
        const kbd = document.getElementById('kbd');
        const sound = document.getElementById('click-sound');

        // بناء الكيبورد
        "QWERTYUIOPASDFGHJKLZXCVBNM1234567890".split("").forEach(c => {
            const k = document.createElement('div');
            k.className = 'key'; k.id = 'k-'+c; k.innerText = c;
            kbd.appendChild(k);
        });

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        hands.onResults(res => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const marks = res.multiHandLandmarks[0];
                
                // رسم الهيكل النيون
                drawConnectors(ctx, marks, HAND_CONNECTIONS, {color: '#ff0000', lineWidth: 4});
                drawLandmarks(ctx, marks, {color: '#fff', radius: 2});

                const x = (1 - marks[8].x) * window.innerWidth;
                const y = marks[8].y * window.innerHeight;

                crosshair.style.display = 'block';
                crosshair.style.left = x - 20 + 'px';
                crosshair.style.top = y - 20 + 'px';

                detectTouch(x, y);
            } else { crosshair.style.display = 'none'; }
        });

        let lastAction = 0;
        function detectTouch(x, y) {
            const targets = document.querySelectorAll('.btn, .key, #search-input');
            targets.forEach(t => {
                const r = t.getBoundingClientRect();
                if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
                    t.classList.add('active');
                    if (Date.now() - lastAction > 1200) {
                        perform(t);
                        lastAction = Date.now() + 5000; // Delay
                    }
                } else { t.classList.remove('active'); }
            });
        }

        function perform(t) {
            sound.currentTime = 0; sound.play();
            if (t.id === 'search-input') kbd.style.display = 'grid';
            if (t.id.startsWith('k-')) searchInput.value += t.innerText;
            if (t.id === 'b-clear') { searchInput.value = ''; kbd.style.display = 'none'; }
            if (t.id === 'b-search') alert("Searching for: " + searchInput.value);
        }

        new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 1280, height: 720 }).start();
    </script>
</body>
</html>
