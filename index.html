<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ZENON AETHER-OS | ELITE EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --main-red: #8B0000; --glow: #ff0000; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--main-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }

        /* اللوجو الخلفي (Abyusif Vibe) */
        #bg-logo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60%; opacity: 0.05; z-index: 1; pointer-events: none; filter: drop-shadow(0 0 20px var(--main-red)); }

        #watermark { position: fixed; bottom: 20px; right: 20px; font-size: 30px; opacity: 0.2; z-index: 1000; pointer-events: none; }

        /* إخفاء الكاميرا */
        #input_video { display: none; } 
        #output_canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99; }

        #ui-layer { position: relative; z-index: 10; padding: 20px; text-align: center; }
        .header-logo { font-size: 3.5rem; text-shadow: 0 0 20px var(--glow); letter-spacing: 10px; margin-top: 20px; }

        #search-bar { width: 70%; height: 60px; background: rgba(10,0,0,0.8); border: 2px solid var(--main-red); border-radius: 5px; color: #fff; text-align: center; font-size: 1.8rem; box-shadow: 0 0 20px #ff000022; transition: 0.3s; }
        #search-bar:hover { border-color: var(--glow); }

        /* الكيبورد الهوائي */
        #air-keyboard { display: none; grid-template-columns: repeat(10, 1fr); gap: 8px; width: 80%; margin: 20px auto; background: rgba(5,0,0,0.9); padding: 15px; border: 1px solid var(--main-red); }
        .key { padding: 15px; background: #000; border: 1px solid #333; color: #fff; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .key.active { background: var(--main-red); box-shadow: 0 0 15px var(--glow); transform: scale(1.1); }

        .dock { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .air-item { width: 110px; height: 110px; background: #080000; border: 2px solid var(--main-red); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; cursor: pointer; }
        .air-item.hovered { background: var(--main-red); color: #fff; box-shadow: 0 0 40px var(--glow); transform: translateY(-10px); }

        #results-area { width: 85%; height: 350px; margin: 20px auto; background: rgba(5,5,5,0.7); border: 1px solid #222; overflow-y: auto; padding: 20px; text-align: left; }
        .card { border-left: 5px solid var(--main-red); background: #0d0000; margin-bottom: 15px; padding: 15px; animation: glitch 0.3s ease; }
        
        #cursor { position: fixed; width: 30px; height: 30px; border: 3px solid #fff; border-radius: 50%; pointer-events: none; z-index: 1001; background: rgba(255,0,0,0.2); mix-blend-mode: difference; }

        @keyframes glitch { 0% { opacity: 0; transform: skewX(-10deg); } 100% { opacity: 1; transform: skewX(0); } }
    </style>
</head>
<body>

    <svg id="bg-logo" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 100 L200 250 L100 400 M400 100 L300 250 L400 400 M200 250 Q250 150 300 250 M150 350 Q250 450 350 350" stroke="#8B0000" stroke-width="15" fill="none" stroke-linecap="round"/>
    </svg>

    <div id="watermark">KIMO_DEV</div>
    <div id="cursor"></div>
    <video id="input_video" autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div class="header-logo">ZENON_AETHER</div>
        
        <div id="search-container">
            <input type="text" id="search-bar" placeholder="[ AIR_SCAN_READY ]" readonly>
        </div>

        <div id="air-keyboard"></div>

        <div class="dock">
            <div class="air-item" id="nav-search"><b>S</b><span>SEARCH</span></div>
            <div class="air-item" id="nav-voice"><b>V</b><span>VOICE</span></div>
            <div class="air-item" id="nav-home"><b>H</b><span>HOME</span></div>
            <div class="air-item" id="nav-wipe"><b>W</b><span>WIPE</span></div>
        </div>

        <div id="results-area">
            <div class="card">AETHER CORE v1.0 ONLINE... GESTURE SENSOR ACTIVE.</div>
        </div>
    </div>

    <audio id="hacker-click" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cursor = document.getElementById('cursor');
        const clickSound = document.getElementById('hacker-click');
        const searchBar = document.getElementById('search-bar');
        const kbd = document.getElementById('air-keyboard');
        const resultsArea = document.getElementById('results-area');

        // بناء الكيبورد
        const keys = "QWERTYUIOPASDFGHJKLZXCVBNM1234567890".split("");
        keys.forEach(k => {
            const btn = document.createElement('div');
            btn.className = 'key air-item-key';
            btn.innerText = k;
            btn.id = 'key-' + k;
            kbd.appendChild(btn);
        });

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#8B0000', lineWidth: 5});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 2});

                const x = (1 - landmarks[8].x) * window.innerWidth;
                const y = landmarks[8].y * window.innerHeight;
                cursor.style.display = 'block';
                cursor.style.left = x + 'px'; cursor.style.top = y + 'px';
                
                checkCollisions(x, y);
            } else { cursor.style.display = 'none'; }
            canvasCtx.restore();
        }

        let hoverTarget = null;
        let hoverStart = 0;

        function checkCollisions(x, y) {
            const allItems = document.querySelectorAll('.air-item, .air-item-key, #search-bar');
            allItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    item.classList.add('hovered', 'active');
                    if (hoverTarget !== item) { hoverTarget = item; hoverStart = Date.now(); }
                    if (Date.now() - hoverStart > 1000) { 
                        execute(item); 
                        hoverStart = Date.now() + 5000; // منع التكرار
                    }
                } else { item.classList.remove('hovered', 'active'); }
            });
        }

        function execute(item) {
            clickSound.play();
            if (item.id === 'search-bar') kbd.style.display = 'grid';
            if (item.id.startsWith('key-')) {
                searchBar.value += item.innerText;
            }
            if (item.id === 'nav-search') {
                resultsArea.innerHTML = `<div class="card">ZENON AI FOUND: <br>Searching data clusters for "${searchBar.value}"... <br>Status: ENCRYPTED.</div>`;
            }
            if (item.id === 'nav-wipe') {
                searchBar.value = ''; kbd.style.display = 'none'; resultsArea.innerHTML = '';
            }
        }

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
        camera.start();
        hands.onResults(onResults);
    </script>
</body>
</html>
