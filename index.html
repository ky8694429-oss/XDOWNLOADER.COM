<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENON AETHER-OS | AIR BROWSER</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --main-red: #8B0000; --glow-red: #ff0000; --bg-black: #000000; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: var(--main-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }

        /* العلامة المائية الثابتة */
        #watermark { position: fixed; bottom: 20px; right: 20px; font-size: 40px; font-weight: bold; opacity: 0.15; z-index: 1000; pointer-events: none; letter-spacing: 5px; }

        /* شاشة الكاميرا والتحليل */
        #input_video { position: fixed; width: 240px; height: 180px; bottom: 20px; left: 20px; border: 2px solid var(--main-red); border-radius: 15px; transform: scaleX(-1); z-index: 100; opacity: 0.6; }
        #output_canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99; }

        /* واجهة المتصفح */
        #ui-layer { position: relative; z-index: 10; padding: 30px; text-align: center; }
        .header-logo { font-size: 3rem; text-shadow: 0 0 15px var(--glow-red); margin-bottom: 10px; }
        
        #search-container { margin: 20px auto; width: 80%; position: relative; }
        #search-bar { width: 100%; height: 60px; background: #0a0a0a; border: 2px solid var(--main-red); border-radius: 30px; color: white; padding: 0 25px; font-size: 1.5rem; outline: none; box-shadow: inset 0 0 10px #ff000033; }

        /* الأيقونات الهوائية */
        .dock { display: flex; justify-content: center; gap: 40px; margin-top: 50px; }
        .air-item { width: 100px; height: 100px; background: #0f0f0f; border: 3px solid var(--main-red); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; position: relative; overflow: hidden; }
        .air-item span { font-size: 10px; margin-top: 5px; font-weight: bold; }
        .air-item.hovered { background: var(--main-red); color: white; transform: scale(1.2); box-shadow: 0 0 30px var(--glow-red); }

        /* كيبورد الهواء (مخفي ويظهر عند البحث) */
        #air-keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; width: 90%; margin: 40px auto; display: none; }
        .key { padding: 15px; border: 1px solid var(--main-red); background: #050505; text-align: center; border-radius: 5px; }

        /* منطقة النتائج بنظام Zenon */
        #results-area { width: 90%; height: 400px; margin: 30px auto; background: #050505; border: 1px solid #1a1a1a; border-radius: 15px; padding: 20px; overflow-y: auto; text-align: left; }
        .result-item { border-left: 4px solid var(--main-red); margin-bottom: 20px; padding: 10px; background: #0a0000; animation: slideIn 0.5s ease; }
        
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* مؤشر الماوس الهوائي */
        #cursor { position: fixed; width: 25px; height: 25px; background: rgba(255, 0, 0, 0.5); border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 1001; display: none; box-shadow: 0 0 15px red; }
    </style>
</head>
<body>

    <div id="watermark">KIMO_DEV</div>
    <div id="cursor"></div>
    <video id="input_video" autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-layer">
        <div class="header-logo">ZENON AETHER OS</div>
        <p style="color: #444;">TOUCHLESS INTERFACE ACTIVE</p>

        <div id="search-container">
            <input type="text" id="search-bar" placeholder="[ WAITING FOR GESTURE ]" readonly>
        </div>

        <div class="dock">
            <div class="air-item" id="nav-back"><b><</b><span>BACK</span></div>
            <div class="air-item" id="nav-home"><b>H</b><span>HOME</span></div>
            <div class="air-item" id="nav-voice"><b>V</b><span>VOICE</span></div>
            <div class="air-item" id="nav-clear"><b>X</b><span>CLEAR</span></div>
        </div>

        <div id="results-area">
            <div id="status-display">Initializing Neural Link... Camera Ready.</div>
        </div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cursor = document.getElementById('cursor');
        const beep = document.getElementById('beep');
        const searchBar = document.getElementById('search-bar');
        const statusDisplay = document.getElementById('status-display');

        let isVoiceActive = false;

        // إعداد تتبع اليد
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // رسم اليد على الكاميرا بستايل أحمر
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#8B0000', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 3});

                // تتبع صباع السبابة (Mouse)
                const indexFinger = landmarks[8];
                const x = (1 - indexFinger.x) * window.innerWidth;
                const y = indexFinger.y * window.innerHeight;

                cursor.style.display = 'block';
                cursor.style.left = x + 'px';
                cursor.style.top = y + 'px';

                handleGestures(x, y, landmarks);
            } else {
                cursor.style.display = 'none';
            }
            canvasCtx.restore();
        }

        let hoverTarget = null;
        let hoverStartTime = 0;

        function handleGestures(x, y, landmarks) {
            const items = document.querySelectorAll('.air-item');
            let found = false;

            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    found = true;
                    if (hoverTarget !== item) {
                        hoverTarget = item;
                        hoverStartTime = Date.now();
                        item.classList.add('hovered');
                        beep.play();
                    } else if (Date.now() - hoverStartTime > 1200) {
                        // تفعيل بعد ثانية
                        triggerAction(item.id);
                        hoverStartTime = Date.now() + 10000; // منع تكرار الضغط
                    }
                } else {
                    item.classList.remove('hovered');
                }
            });

            if (!found) { hoverTarget = null; }
        }

        function triggerAction(id) {
            if (id === 'nav-voice') startVoiceSearch();
            if (id === 'nav-clear') { searchBar.value = ''; statusDisplay.innerHTML = 'System Wiped.'; }
            if (id === 'nav-home') { statusDisplay.innerHTML = '<div class="result-item">Welcome back, KIMO. AI Core Online.</div>'; }
        }

        // البحث الصوتي الذكي
        function startVoiceSearch() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-EG';
            recognition.start();
            statusDisplay.innerHTML = "Listening to your voice...";

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                searchBar.value = transcript;
                statusDisplay.innerHTML = `<div class="result-item">Searching for: <b style="color:white">${transcript}</b><br>Zenon AI is processing data...</div>`;
                // محاكاة نتائج ذكاء اصطناعي
                setTimeout(() => {
                    statusDisplay.innerHTML += `<div class="result-item">AI Result: Everything about ${transcript} is now filtered through Zenon Security Protocol. No trackers found.</div>`;
                }, 1500);
            };
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
        hands.onResults(onResults);
    </script>
</body>
</html>
