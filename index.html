<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <!-- (حافظت لك على كل الـ SEO والـ Fonts والـ Styles اللي كنت عاملها) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XDownloader | أقوى موقع تحميل فيديوهات وصور مجاناً</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oxanium:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #05050a; }
        .font-num { font-family: 'Oxanium', sans-serif; }
        .neon-border { box-shadow: 0 0 15px rgba(139, 92, 246, 0.15), inset 0 0 15px rgba(139, 92, 246, 0.05); border: 1px solid rgba(139, 92, 246, 0.25); }
        .neon-glow-button { box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3); }
        .neon-text-glow { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        @keyframes Float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .floating-element { animation: Float 4s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between overflow-x-hidden">
    <!-- (نفس الهيكل والتصميم اللي انت عايزه) -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-purple-950/20 via-slate-950 to-black -z-50"></div>
    
    <header class="border-b border-purple-900/30 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <span class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 neon-text-glow">XDOWNLOADER</span>
            <span class="bg-purple-950/60 text-purple-400 text-xs px-3 py-1.5 rounded-xl border border-purple-500/30 font-bold">POWERED BY KIMO</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-10 px-4 relative">
        <div class="max-w-4xl w-full text-center space-y-12">
            <div class="space-y-4 floating-element">
                <h1 class="text-4xl sm:text-7xl font-black text-white">الوحش السريع للتحميل المتكامل</h1>
            </div>

            <div class="bg-slate-900/60 backdrop-blur-2xl p-6 sm:p-10 rounded-3xl neon-border text-right">
                <form id="coreDownloaderForm" class="space-y-5">
                    <input type="url" id="targetUrlInput" required placeholder="ضع رابط الفيديو هنا..." class="w-full bg-black/70 border border-slate-800 rounded-2xl py-5 px-6 text-white focus:outline-none focus:border-purple-500">
                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-black py-5 rounded-2xl transition hover:scale-[1.01] text-xl">تنزيل (Download)</button>
                </form>

                <div id="dynamicResultWrapper" class="mt-10 pt-8 border-t border-slate-800/80 hidden">
                    <div id="engineLoading" class="hidden flex-col items-center py-8"><div class="animate-spin w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full"></div></div>
                    <div id="engineError" class="hidden bg-red-950/40 border border-red-500/40 text-red-300 p-5 rounded-2xl">حدث خطأ، تأكد من صحة الرابط!</div>
                    <div id="engineSuccess" class="hidden space-y-6">
                        <div class="bg-black/40 p-5 rounded-2xl border border-slate-800 flex items-center gap-5">
                            <img id="resThumbnail" src="" class="w-24 h-24 object-cover rounded-xl">
                            <h3 id="resTitle" class="font-bold">تم جلب المحتوى</h3>
                        </div>
                        <div id="actionLinksContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('coreDownloaderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const rawUrl = document.getElementById('targetUrlInput').value.trim();
            const wrapper = document.getElementById('dynamicResultWrapper');
            const loader = document.getElementById('engineLoading');
            const successBlock = document.getElementById('engineSuccess');
            const linksContainer = document.getElementById('actionLinksContainer');
            
            wrapper.classList.remove('hidden'); loader.classList.remove('hidden');
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: rawUrl })
                });
                const data = await response.json();
                
                // التعديل الذكي: بياخد أي داتا بتيجي من السيرفر
                document.getElementById('resTitle').innerText = data.filename || 'تم جلب المقطع بنجاح';
                document.getElementById('resThumbnail').src = data.thumbnail || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500';
                
                linksContainer.innerHTML = '';
                if(data.url) {
                    linksContainer.innerHTML = `<a href="${data.url}" target="_blank" class="bg-purple-600 p-4 rounded-xl text-center font-bold">تحميل المقطع (HD)</a>`;
                } else if(data.picker) {
                    data.picker.forEach(p => {
                        linksContainer.innerHTML += `<a href="${p.url}" target="_blank" class="bg-slate-800 p-3 rounded-lg text-xs text-center">تحميل ${p.type === 'image' ? 'الصورة' : 'الفيديو'}</a>`;
                    });
                }
                
                loader.classList.add('hidden');
                successBlock.classList.remove('hidden');
            } catch(err) {
                loader.classList.add('hidden');
                document.getElementById('engineError').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
